apiVersion: apps/v1
kind: Deployment
metadata:
  name: mindtrack-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node
  template:
    metadata:
      labels:
        app: node
    spec:
      containers: 
      - name: mindtrack-container
        image: 299332719675.dkr.ecr.us-east-1.amazonaws.com/mindtrack-repo:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
