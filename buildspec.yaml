version: 0.2

phases:
  pre_build:
    commands:
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 299332719675.dkr.ecr.us-east-1.amazonaws.com
      - echo "Logged in to Docker Hub"

  build:
    commands:
      - echo "Build Started"
      - docker build -t mindtrack-nginx .

  post_build:
    commands:
      - docker tag mindtrack-nginx:latest 299332719675.dkr.ecr.us-east-1.amazonaws.com/mindtrack-repo:latest
      - docker push 299332719675.dkr.ecr.us-east-1.amazonaws.com/mindtrack-repo:latest
      - echo "Image pushed to the docker hub repo"

artifacts:
  files:
    - '**/*'
